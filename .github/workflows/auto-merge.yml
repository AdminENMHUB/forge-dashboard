name: Auto-merge PRs

# Automatically enable squash-merge on any PR once all required CI checks pass.
# Works for both human authors and bots (e.g. Dependabot, Copilot).

on:
  pull_request:
    types: [opened, synchronize, reopened, ready_for_review]

jobs:
  enable-auto-merge:
    name: Enable auto-merge
    runs-on: ubuntu-latest
    # Skip draft PRs — wait until they're marked ready
    if: github.event.pull_request.draft == false
    permissions:
      contents: write
      pull-requests: write

    steps:
      - name: Enable auto-merge (squash) via GitHub CLI
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh pr merge --auto --squash "${{ github.event.pull_request.number }}" \
            --repo "${{ github.repository }}"
